<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>市场观察表 · 隔夜雷达</title>
  <link rel="stylesheet" href="/src/style.css">

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1ZZ6E4WBLQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1ZZ6E4WBLQ');
  </script>
</head>
<body>
  <!-- ─── 主内容区 ────────────────────── -->
  <div id="app" style="display:none">
    <header class="app-header" id="app-header">
      <!-- 由 JS 动态填充：根据当前 view 显示不同 header -->
    </header>

    <main id="view-container">
      <!-- 由 JS 动态填充：hash 路由切换 view -->
    </main>
  </div>

  <!-- ─── 底部 Tab 导航 ────────────────── -->
  <nav id="tab-nav" class="tab-nav" style="display:none">
    <button class="tab-item active" data-view="heatmap">
      <span class="tab-icon">🌐</span>
      <span class="tab-label">市场观察</span>
    </button>
    <button class="tab-item" data-view="radar">
      <span class="tab-icon">📡</span>
      <span class="tab-label">隔夜雷达</span>
    </button>
  </nav>

  <!-- ─── 加载/错误状态 ────────────────── -->
  <div id="loading" class="loading">
    <p>正在加载市场数据...</p>
  </div>

  <div id="error" class="error" style="display:none">
    <p>数据加载失败，请稍后重试。</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
